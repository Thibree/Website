<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grenoble</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0e0d;
    color: #e8e0d5;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;
    filter: brightness(0.75) saturate(0.9);
    transform: scale(1.05);
    animation: slowzoom 18s ease-in-out infinite alternate;
  }

  @keyframes slowzoom {
    from { transform: scale(1.05); }
    to   { transform: scale(1.12); }
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(15,14,13,0.1) 0%, rgba(15,14,13,0.55) 100%);
  }

  .hero-text {
    position: relative;
    text-align: center;
    letter-spacing: 0.12em;
  }

  .hero-text h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 300;
    color: #f5efe8;
    text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    line-height: 1;
  }

  .hero-text .sub {
    margin-top: 1rem;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: #c8bfb0;
    letter-spacing: 0.35em;
    font-style: italic;
    font-family: 'Georgia', serif;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0.6;
    animation: bounce 2.2s ease-in-out infinite;
  }

  .scroll-hint span {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: #c8bfb0;
  }

  .scroll-hint svg { color: #c8bfb0; }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(8px); }
  }

  /* GALLERY SECTION */
  .gallery-section {
    padding: 5rem 2rem 6rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  .section-label {
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    color: #8a7f72;
    margin-bottom: 3.5rem;
    text-transform: uppercase;
  }

  /* Masonry grid */
  .masonry {
    columns: 2;
    column-gap: 1.2rem;
  }

  @media (max-width: 700px) {
    .masonry { columns: 1; }
  }

  .photo-card {
    break-inside: avoid;
    margin-bottom: 1.2rem;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .photo-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .photo-card img {
    width: 100%;
    display: block;
    transition: transform 0.6s ease, filter 0.4s ease;
    filter: saturate(0.92) brightness(0.95);
  }

  .photo-card:hover img {
    transform: scale(1.04);
    filter: saturate(1.1) brightness(1.02);
  }

  .photo-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 2rem 1.2rem 1rem;
    background: linear-gradient(to top, rgba(10,9,8,0.75) 0%, transparent 100%);
    color: #e8e0d5;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    font-style: italic;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }

  .photo-card:hover .photo-caption {
    opacity: 1;
    transform: translateY(0);
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox.open {
    display: flex;
  }

  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    animation: lbfade 0.3s ease;
  }

  @keyframes lbfade {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  .lb-close {
    position: absolute;
    top: 1.5rem;
    right: 2rem;
    font-size: 2rem;
    color: #8a7f72;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    transition: color 0.2s;
  }
  .lb-close:hover { color: #e8e0d5; }

  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2rem;
    color: #8a7f72;
    cursor: pointer;
    background: none;
    border: none;
    padding: 1rem;
    transition: color 0.2s;
    user-select: none;
  }
  .lb-nav:hover { color: #e8e0d5; }
  .lb-prev { left: 1rem; }
  .lb-next { right: 1rem; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 3rem 1rem;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: #4a4440;
    border-top: 1px solid #1e1c1a;
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <img class="hero-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png" alt="hero"
    onerror="this.style.display='none'"
    id="heroImg"
  />
  <!-- We'll use a CSS gradient as hero background since images are uploaded by user -->
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,#2c3a2e 0%,#4a5240 30%,#6b5a3e 60%,#3d3530 100%);"></div>
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <h1>Grenoble</h1>
    <p class="sub">Erasmus &nbsp;·&nbsp; The Alps &nbsp;·&nbsp; Unforgettable</p>
  </div>
  <div class="scroll-hint">
    <span>scroll</span>
    <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 2v16M2 12l6 6 6-6"/>
    </svg>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery-section">
  <p class="section-label">Memories from the mountains</p>

  <div class="masonry" id="gallery">

    <div class="photo-card" onclick="openLb(0)">
      <img src="images/foto1.jpg" alt="Photo 1" />
      <div class="photo-caption">Autumn in the Alps</div>
    </div>

    <div class="photo-card" onclick="openLb(1)">
      <img src="images/foto2.jpg" alt="Photo 2" />
      <div class="photo-caption">Summit feeling</div>
    </div>

    <div class="photo-card" onclick="openLb(2)">
      <img src="images/foto3.jpg" alt="Photo 3" />
      <div class="photo-caption">Riding together</div>
    </div>

    <div class="photo-card" onclick="openLb(3)">
      <img src="images/foto4.jpg" alt="Photo 4" />
      <div class="photo-caption">Pure joy at the top</div>
    </div>

    <div class="photo-card" onclick="openLb(4)">
      <img src="images/foto5.jpg" alt="Photo 5" />
      <div class="photo-caption">Eyes on the summit</div>
    </div>

  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLb()">×</button>
  <button class="lb-nav lb-prev" onclick="navLb(-1)">‹</button>
  <img id="lbImg" src="" alt=""/>
  <button class="lb-nav lb-next" onclick="navLb(1)">›</button>
</div>

<footer>
  <span>Grenoble Erasmus &nbsp;·&nbsp; A Chapter Worth Remembering</span>
</footer>
<script>
  // ---- Scroll reveal ----
  const cards = document.querySelectorAll('.photo-card');

  const observer = new IntersectionObserver(entries => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), i * 120);
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });

  cards.forEach(c => observer.observe(c));

  // ---- Static photo array ----
  const photoUrls = [
    "images/foto1.jpg",
    "images/foto2.jpg",
    "images/foto3.jpg",
    "images/foto4.jpg",
    "images/foto5.jpg"
  ];

  // ---- Lightbox ----
  let lbIdx = 0;

  function openLb(idx) {
    lbIdx = idx;
    document.getElementById('lbImg').src = photoUrls[idx];
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navLb(dir) {
    lbIdx = (lbIdx + dir + photoUrls.length) % photoUrls.length;

    const img = document.getElementById('lbImg');

    img.style.opacity = 0;

    setTimeout(() => {
      img.src = photoUrls[lbIdx];
      img.style.opacity = 1;
    }, 150);
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLb();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowRight') navLb(1);
    if (e.key === 'ArrowLeft') navLb(-1);
  });
</script>
</body>
</html>
